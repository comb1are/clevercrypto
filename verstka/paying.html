<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Fotns -->
    <link rel="stylesheet" href="./assets/fonts/nebulas/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/SFCompactText/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/nagel/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/SFProDisplay/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/HelveticaNeue/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/SFProText/stylesheet.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Link Swiper's CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Syle CSS -->
    <link rel="stylesheet" href="./assets/scss/style.css">
</head>

<body>

    <div class="wrapper p-0 d-flex">

        <!-- Paying -->
        <section class="paying h-full d-flex flex-column">
            <div class="container h-full d-flex flex-column justify-content-between gap-3">
                <div class="w-100">
                    <div class="paying-head d-flex align-items-center justify-content-between pb-3 mb-1">
                        <div class="d-flex align-items-center">
                            <div class="paying-head__img d-flex align-items-center">
                                <img src="./assets/images/pay-logo-1.svg" width="40" alt="" class="flex-shrink-0 rounded-circle">
                                <img src="./assets/images/pay-logo-2.svg" width="40" alt="" class="flex-shrink-0 rounded-circle">
                            </div>
                            <h2 class="fw-medium lh-1 ps-2 ms-1">Funpay</h2>
                        </div>
                        <p class="fs-6">#451940</p>
                    </div>
                    <div class="paying-body d-flex flex-column">
                        <label for="">Выберите способ оплаты</label>
                        <div class="paying-card d-flex flex-column w-100 position-relative overflow-hidden">
                            <div class="d-flex align-items-center justify-content-between">
                                <img src="./assets/images/paying-card-logo-1.svg" alt="">
                                <input type="radio" name="payType" checked class="position-absolute top-0 start-0 w-100 h-100">
                                <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                    <span class="rounded-circle"></span>
                                </div>
                            </div>
                            <div class="d-flex flex-column gap-2">
                                <h3 class="fw-medium lh-1">Оплата криптовалютой</h3>
                                <p class="fs-6">Оплатита любой криптовалютой</p>
                            </div>
                        </div>
                        <div class="paying-card d-flex flex-column w-100 position-relative overflow-hidden">
                            <div class="d-flex align-items-center justify-content-between">
                                <div class="paying-card__images d-flex align-items-center">
                                    <img src="./assets/images/bank-card-1.svg" alt="">
                                    <img src="./assets/images/bank-card-2.svg" alt="">
                                    <img src="./assets/images/bank-card-3.svg" alt="">
                                    <img src="./assets/images/bank-card-4.svg" alt="">
                                </div>
                                <input type="radio" name="payType" id="" class="position-absolute top-0 start-0 w-100 h-100">
                                <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                    <span class="rounded-circle"></span>
                                </div>
                            </div>
                            <div class="d-flex flex-column gap-2">
                                <h3 class="fw-medium lh-1">Оплата криптовалютой</h3>
                                <p class="fs-6">Оплатита любой криптовалютой</p>
                            </div>
                        </div>
                        <button class="w-100 d-flex align-items-center justify-content-center btn-secondary">
                            <span>Другие способы оплаты</span>
                            <svg width="24" height="25" viewBox="0 0 24 25" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 10.2368L11.2929 13.5297C11.6834 13.9202 12.3166 13.9202 12.7071 13.5297L16 10.2368" stroke="#282828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="w-100 d-flex flex-column paying-bottom">
                    <button class="w-100 d-flex align-items-center justify-content-center fw-medium btn-neutral">Продолжить</button>
                    <button class="w-100 d-flex align-items-center justify-content-center btn-space" type="button" data-bs-toggle="offcanvas" data-bs-target="#detailModal" aria-controls="detailModal">
                        <img src="./assets/images/warning-circle-gray.svg" alt="" class="flex-shrink-0">
                        <img src="./assets/images/warning-circle-gray-dark.svg" alt="" class="flex-shrink-0 dark-icon">
                        <span>Детали платежа</span>
                    </button>
                </div>
            </div>
        </section>
        <!-- Paying end -->

        <!-- Show payment modal -->
        <div class="offcanvas offcanvas-bottom border-0 main-modal details-modal" tabindex="-1" id="detailModal" aria-labelledby="detailModalLabel">
            <div class="offcanvas-body">
                <div class="container d-flex flex-column gap-4">
                    <h2 class="fw-medium lh-1">Детали платежа</h2>
                    <ul class="d-flex flex-column gap-4">
                        <li class="d-flex align-items-center justify-content-between gap-3">
                            <p class="fs-6">Продавец</p>
                            <div class="d-flex align-items-center gap-2">
                                <img src="./assets/images/business-logo-2.svg" width="22" height="22" alt="" class="rounded-circle ">
                                <h3 class="fs-6 text-blue">FunPay</h3>
                            </div>
                        </li>
                        <li class="d-flex align-items-center justify-content-between gap-3">
                            <p class="fs-6">Страховой депозит</p>
                            <div class="d-flex align-items-center gap-2">
                                <img src="./assets/images/payment-crypto-1.svg" width="22" height="22" alt="" class="rounded-circle ">
                                <h3 class="fs-6">120.50 CLV</h3>
                            </div>
                        </li>
                        <li class="d-flex align-items-center justify-content-between gap-3">
                            <p class="fs-6">Номер заказа</p>
                            <h3 class="fs-6 flex-shrink-0">#124624</h3>
                        </li>
                    </ul>
                    <div class="btns w-100 d-flex flex-column">
                        <a href="" class="w-100 d-flex align-items-center justify-content-center link-btn">
                            <img src="./assets/images/message-icon.svg" alt="" class="flex-shrink-0">
                            <span>Написать продавцу</span>
                        </a>
                        <a href="#" class="w-100 d-flex align-items-center justify-content-center btn-red">
                            <img src="./assets/images/alert-red.svg" width="24" alt="" class="flex-shrink-0">
                            <span>Открыть спор</span>
                        </a>
                        <button class="w-100 d-flex align-items-center justify-content-center text-center btn-secondary" type="button" data-bs-dismiss="offcanvas" aria-label="Close">Закрыть</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Show payment modal end -->

    </div>

    <!-- iMask JS -->
    <script src="./assets/js/iMask.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <!-- JS file -->
    <script src="./assets/js/main.js"></script>

</body>

</html>
