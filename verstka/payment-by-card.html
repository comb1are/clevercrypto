<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Fotns -->
    <link rel="stylesheet" href="./assets/fonts/nebulas/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/SFCompactText/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/nagel/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/SFProDisplay/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/HelveticaNeue/stylesheet.css">
    <link rel="stylesheet" href="./assets/fonts/SFProText/stylesheet.css">
    <!-- Bootstrap CSS -->

    <!-- Link Swiper's CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Syle CSS -->
    <link rel="stylesheet" href="./assets/scss/style.css">
</head>

<body>

    <div class="wrapper p-0 d-flex">

        <!-- Paying -->
        <section class="paying h-full d-flex flex-column">
            <div class="container h-full d-flex flex-column justify-content-between gap-4">
                <div class="w-100">
                    <div class="paying-head d-flex align-items-center justify-content-between pb-3 mb-1">
                        <div class="paying-head__left d-flex align-items-center">
                            <a href="#" class="d-flex align-items-center justify-content-center btn-secondary rounded-circle p-0">
                                <svg width="20" height="21" viewBox="0 0 20 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9.75993 5.52727C9.43449 5.20186 8.90697 5.20184 8.58154 5.52727L4.46126 9.64755C4.13593 9.97298 4.13589 10.5005 4.46126 10.8259L8.58154 14.9462C8.90695 15.2716 9.43449 15.2715 9.75993 14.9462C10.0854 14.6208 10.0853 14.0933 9.75993 13.7678L7.06217 11.0701H14.9479C15.4081 11.0701 15.7812 10.6969 15.7812 10.2367C15.7812 9.7765 15.4082 9.4034 14.9479 9.4034H7.06217L9.75993 6.70565L9.81689 6.64217C10.0839 6.31486 10.065 5.83237 9.75993 5.52727Z" fill="#282828" />
                                </svg>
                            </a>
                            <div class="paying-head__img d-flex align-items-center">
                                <img src="./assets/images/pay-logo-1.svg" width="40" alt="" class="flex-shrink-0 rounded-circle">
                                <img src="./assets/images/pay-logo-2.svg" width="40" alt="" class="flex-shrink-0 rounded-circle">
                            </div>
                            <h2 class="fw-medium lh-1">Funpay</h2>
                        </div>
                        <p class="fs-6">#451940</p>
                    </div>
                    <div class="paying-body d-flex flex-column">
                        <label for="">Выберите валюту для оплаты</label>
                        <div class="form-search d-flex align-items-center gap-3 ps-4">
                            <button class="h-100 flex-shrink-0">
                                <img src="./assets/images/search-icon-2.svg" alt="">
                                <img src="./assets/images/search-icon-2-dark.svg" alt="" class="dark-icon">
                            </button>
                            <input type="text" placeholder="Найти валюту" class="w-100 fs-6 pe-2">
                        </div>
                        <div class="row g-1">
                            <div class="col-6">
                                <div class="country-card d-flex align-items-start flex-column gap-3 position-relative overflow-hidden">
                                    <div class="w-100 d-flex align-items-center justify-content-between gap-3">
                                        <img src="./assets/images/flag-ru.svg" width="28" height="28" alt="" class="flex-shrink-0 rounded-circle">
                                        <input type="radio" name="selectCountry" checked class="position-absolute top-0 start-0 w-100 h-100">
                                        <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                            <span class="rounded-circle"></span>
                                        </div>
                                    </div>
                                    <h3 class="fw-medium fs-6">
                                        RUB <span>₽</span>
                                    </h3>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="country-card d-flex align-items-start flex-column gap-3 position-relative overflow-hidden">
                                    <div class="w-100 d-flex align-items-center justify-content-between gap-3">
                                        <img src="./assets/images/flag-usa.svg" width="28" height="28" alt="" class="flex-shrink-0 rounded-circle">
                                        <input type="radio" name="selectCountry" class="position-absolute top-0 start-0 w-100 h-100">
                                        <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                            <span class="rounded-circle"></span>
                                        </div>
                                    </div>
                                    <h3 class="fw-medium fs-6">
                                        USD <span>$</span>
                                    </h3>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="country-card d-flex align-items-start flex-column gap-3 position-relative overflow-hidden">
                                    <div class="w-100 d-flex align-items-center justify-content-between gap-3">
                                        <img src="./assets/images/flag-kz.svg" width="28" height="28" alt="" class="flex-shrink-0 rounded-circle">
                                        <input type="radio" name="selectCountry" class="position-absolute top-0 start-0 w-100 h-100">
                                        <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                            <span class="rounded-circle"></span>
                                        </div>
                                    </div>
                                    <h3 class="fw-medium fs-6">
                                        KZT <span>₸</span>
                                    </h3>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="country-card d-flex align-items-start flex-column gap-3 position-relative overflow-hidden">
                                    <div class="w-100 d-flex align-items-center justify-content-between gap-3">
                                        <img src="./assets/images/flag-by.svg" width="28" height="28" alt="" class="flex-shrink-0 rounded-circle">
                                        <input type="radio" name="selectCountry" class="position-absolute top-0 start-0 w-100 h-100">
                                        <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                            <span class="rounded-circle"></span>
                                        </div>
                                    </div>
                                    <h3 class="fw-medium fs-6">
                                        BYN <span>Br</span>
                                    </h3>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="country-card d-flex align-items-start flex-column gap-3 position-relative overflow-hidden">
                                    <div class="w-100 d-flex align-items-center justify-content-between gap-3">
                                        <img src="./assets/images/flag-ua.svg" width="28" height="28" alt="" class="flex-shrink-0 rounded-circle">
                                        <input type="radio" name="selectCountry" class="position-absolute top-0 start-0 w-100 h-100">
                                        <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                            <span class="rounded-circle"></span>
                                        </div>
                                    </div>
                                    <h3 class="fw-medium fs-6">
                                        UAH <span>₴</span>
                                    </h3>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="country-card d-flex align-items-start flex-column gap-3 position-relative overflow-hidden">
                                    <div class="w-100 d-flex align-items-center justify-content-between gap-3">
                                        <img src="./assets/images/flag-tj.svg" width="28" height="28" alt="" class="flex-shrink-0 rounded-circle">
                                        <input type="radio" name="selectCountry" class="position-absolute top-0 start-0 w-100 h-100">
                                        <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                            <span class="rounded-circle"></span>
                                        </div>
                                    </div>
                                    <h3 class="fw-medium fs-6">
                                        TJS <span>с</span>
                                    </h3>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="country-card d-flex align-items-start flex-column gap-3 position-relative overflow-hidden">
                                    <div class="w-100 d-flex align-items-center justify-content-between gap-3">
                                        <img src="./assets/images/flag-uz.svg" width="28" height="28" alt="" class="flex-shrink-0 rounded-circle">
                                        <input type="radio" name="selectCountry" class="position-absolute top-0 start-0 w-100 h-100">
                                        <div class="icon rounded-circle d-flex align-items-center justify-content-center">
                                            <span class="rounded-circle"></span>
                                        </div>
                                    </div>
                                    <h3 class="fw-medium fs-6">
                                        UZS <span>Soʻm</span>
                                    </h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="w-100 d-flex flex-column paying-bottom">
                    <button class="w-100 d-flex align-items-center justify-content-center fw-medium btn-neutral">Продолжить</button>
                    <button class="w-100 d-flex align-items-center justify-content-center btn-space" type="button" data-bs-toggle="offcanvas" data-bs-target="#detailModal" aria-controls="detailModal">
                        <img src="./assets/images/warning-circle-gray.svg" alt="" class="flex-shrink-0">
                        <img src="./assets/images/warning-circle-gray-dark.svg" alt="" class="flex-shrink-0 dark-icon">
                        <span>Детали платежа</span>
                    </button>
                </div>
            </div>
        </section>
        <!-- Paying end -->

        <!-- Show payment modal -->
        <div class="offcanvas offcanvas-bottom border-0 main-modal details-modal" tabindex="-1" id="detailModal" aria-labelledby="detailModalLabel">
            <div class="offcanvas-body">
                <div class="container d-flex flex-column gap-4">
                    <h2 class="fw-medium lh-1">Детали платежа</h2>
                    <ul class="d-flex flex-column gap-4">
                        <li class="d-flex align-items-center justify-content-between gap-3">
                            <p class="fs-6">Продавец</p>
                            <div class="d-flex align-items-center gap-2">
                                <img src="./assets/images/business-logo-2.svg" width="22" height="22" alt="" class="rounded-circle ">
                                <h3 class="fs-6 text-blue">FunPay</h3>
                            </div>
                        </li>
                        <li class="d-flex align-items-center justify-content-between gap-3">
                            <p class="fs-6">Страховой депозит</p>
                            <div class="d-flex align-items-center gap-2">
                                <img src="./assets/images/payment-crypto-1.svg" width="22" height="22" alt="" class="rounded-circle ">
                                <h3 class="fs-6">120.50 CLV</h3>
                            </div>
                        </li>
                        <li class="d-flex align-items-center justify-content-between gap-3">
                            <p class="fs-6">Номер заказа</p>
                            <h3 class="fs-6 flex-shrink-0">#124624</h3>
                        </li>
                    </ul>
                    <div class="btns w-100 d-flex flex-column">
                        <a href="" class="w-100 d-flex align-items-center justify-content-center link-btn">
                            <img src="./assets/images/message-icon.svg" alt="" class="flex-shrink-0">
                            <span>Написать продавцу</span>
                        </a>
                        <a href="#" class="w-100 d-flex align-items-center justify-content-center btn-red">
                            <img src="./assets/images/alert-red.svg" width="24" alt="" class="flex-shrink-0">
                            <span>Открыть спор</span>
                        </a>
                        <button class="w-100 d-flex align-items-center justify-content-center text-center btn-secondary" type="button" data-bs-dismiss="offcanvas" aria-label="Close">Закрыть</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Show payment modal end -->

    </div>

    <!-- iMask JS -->
    <script src="./assets/js/iMask.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <!-- JS file -->
    <script src="./assets/js/main.js"></script>
